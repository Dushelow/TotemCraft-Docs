# ===============================================
# TotemCraft - server.properties (Example / Template)
# ===============================================
# Это шаблон. Перед использованием замени плейсхолдеры на свои значения.

# ------------------- Основные настройки -------------------
accepts-transfers=false
allow-flight=false
broadcast-console-to-ops=true
broadcast-rcon-to-ops=true
debug=false
difficulty=hard
enable-command-block=false
enable-query=true
enable-rcon=false
enable-status=true
enforce-whitelist=false
entity-broadcast-range-percentage=75
gamemode=survival
generate-structures=true
hardcore=false
initial-enabled-packs=vanilla
level-name=2025                    # Название мира (можно изменить)
level-seed=                        # Оставь пустым или укажи свой
level-type=minecraft:normal
max-players=50
max-world-size=15000
motd=§bВанильный сервер §f| §aБез доната §f| §eБез вайпов
online-mode=false
pvp=true
query.port=25565                    # Стандартный порт Java Edition (пример)
server-ip=0.0.0.0
server-port=25565                   # Query порт (пример, для мониторингов)
simulation-distance=6
spawn-protection=1
view-distance=9

# ------------------- Производительность -------------------
max-chained-neighbor-updates=10000
network-compression-threshold=256
pause-when-empty-seconds=-1
sync-chunk-writes=false
use-native-transport=true

# ------------------- Безопасность и управление -------------------
enforce-secure-profile=false
log-ips=true
op-permission-level=4
prevent-proxy-connections=false
rate-limit=0
white-list=false

# ------------------- RCON и Management (важно!) -------------------
rcon.password=                      # Рекомендуется отключить RCON или поставить сложный пароль
rcon.port=25575                     # Стандартный порт (пример)

# Management Server — используется для некоторых инструментов мониторинга
management-server-enabled=false
management-server-secret=
management-server-host=localhost
management-server-port=0

# ------------------- Resource Pack -------------------
require-resource-pack=false
resource-pack=
resource-pack-sha1=
resource-pack-prompt=

# ===============================================
# Примечание:
# - порты, ключи и сид указаны неактуальные, либо как пустые строки, для примера
# - значения сида и ключей генерируются и сохраняются автоматически при запуске сервера
# ===============================================
