      Author:
        Name: "${entity.owner.name} приручил ${entity.type.name() == 'WOLF' ? 'волка' : entity.type.name() == 'CAT' ? 'кошку' : entity.type.name() == 'HORSE' ? 'лошадь' : entity.type.name() == 'DONKEY' ? 'осла' : entity.type.name() == 'MULE' ? 'мула' : entity.type.name() == 'PARROT' ? 'попугая' : entity.type.name() == 'SKELETON_HORSE' ? 'скелетную лошадь' : entity.type.name().toLowerCase()}"