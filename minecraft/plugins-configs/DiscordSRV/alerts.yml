      Title:
        Text: "${caught.itemStack.type.name() == 'COD' ? 'Трофейная треска' : caught.itemStack.type.name() == 'SALMON' ? 'Трофейный лосось' : caught.itemStack.type.name() == 'PUFFERFISH' ? 'Трофейный иглобрюх' : 'Трофейная тропическая рыба'}"
      Description: "**Вес:** ${(#event.hashCode() % 110 + 110) / 10.0} кг\n**Биом:** ${T(com.google.gson.JsonParser).parseString(T(java.nio.file.Files).readString(T(java.nio.file.Paths).get('plugins/DiscordSRV/assets/ru_ru.json'))).getAsJsonObject().get('biome.minecraft.' + #player.location.block.biome.name().toLowerCase()).getAsString()}\n**Погода:** ${#player.world.hasStorm() ? 'Гроза' : #player.world.isThundering() ? 'Дождь' : 'Ясно'}\n**Время:** ${#player.world.time < 6000 ? 'Утро' : #player.world.time < 12000 ? 'День' : #player.world.time < 18000 ? 'Вечер' : 'Ночь'}"
      Footer:
        Text: "⭐ Мифический улов!"
      Timestamp: true

  # ── Сокровища ─────────────────────────────────────────────────────
  - Trigger: org.bukkit.event.player.PlayerFishEvent
    Channel: fish
    Conditions:
      - state.name() == 'CAUGHT_FISH'
      - caught.itemStack.type.name() matches '(ENCHANTED_BOOK|HEART_OF_THE_SEA)'
    Embed:
      Enabled: true
      Color: "#2f3136"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/${caught.itemStack.type.name().toLowerCase()}.png"
      Author:
        Name: "{name} поймал сокровище"
      Description: "**${caught.itemStack.type.name() == 'ENCHANTED_BOOK' ? 'Зачарованную книгу' : 'Сердце моря'}**"

  # ── Достижения ────────────────────────────────────────────────────
  - Trigger: org.bukkit.event.player.PlayerAdvancementDoneEvent
    Channel: chronicle
    Conditions:
      - '#event.advancement.display != null'
    Embed:
      Enabled: true
      Color: "#FFD700"
      Author:
        ImageUrl: "{embedavatarurl}"
        Name: "{name} свершил подвиг!"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/writable_book.png"
      Title:
        Text: "${T(com.google.gson.JsonParser).parseString(T(java.nio.file.Files).readString(T(java.nio.file.Paths).get('plugins/DiscordSRV/assets/ru_ru.json'))).getAsJsonObject().get(#event.advancement.display.title().key()).getAsString()}"
      Description: "${T(com.google.gson.JsonParser).parseString(T(java.nio.file.Files).readString(T(java.nio.file.Paths).get('plugins/DiscordSRV/assets/ru_ru.json'))).getAsJsonObject().get(#event.advancement.display.description().key()).getAsString()}"
      Footer:
        Text: "✦ Достижение разблокировано"
      Timestamp: true

  # ── Боссы ─────────────────────────────────────────────────────────
  - Trigger: org.bukkit.event.entity.EntityDeathEvent
    Channel: chronicle
    Conditions:
      - entity.type.name() matches '(WITHER|ENDER_DRAGON|WARDEN)'
    Embed:
      Enabled: true
      Color: "#2f3136"
      ThumbnailUrl: "${entity.type.name() == 'WITHER' ? 'https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/wither_spawn_egg.png' : entity.type.name() == 'ENDER_DRAGON' ? 'https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/ender_dragon_spawn_egg.png' : 'https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/warden_spawn_egg.png'}"
      Author:
        Name: "${entity.killer != null ? entity.killer.name : 'Игрок'} одолел чудовище"
      Description: "**${entity.type.name() == 'WITHER' ? 'Визера' : entity.type.name() == 'ENDER_DRAGON' ? 'Краевого дракона' : 'Хранителя'}**"

  # ── Тотем ─────────────────────────────────────────────────────────
  - Trigger: org.bukkit.event.entity.EntityResurrectEvent
    Channel: chronicle
    Embed:
      Enabled: true
      Color: "#2f3136"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/totem_of_undying.png"
      Author:
        Name: "${entity.name} ловко избежал смерти"

  # ── Зачарование ───────────────────────────────────────────────────
  - Trigger: org.bukkit.event.enchantment.EnchantItemEvent
