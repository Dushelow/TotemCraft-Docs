# ── Первый вход ───────────────────────────────────────────────────
  - Trigger: org.bukkit.event.player.PlayerJoinEvent
    Channel: chronicle
    Conditions:
      - '#event.player.hasPlayedBefore() == false'
    Embed:
      Enabled: true
      Color: "#2f3136"
      Author:
        ImageUrl: "{embedavatarurl}"
        Name: "{name} впервые ступает на земли ТотемКрафта!"
      Footer:
        Text: "Добро пожаловать!"
      Timestamp: true

# ── PvP ──────────────────────────────────────────────────────────
  - Trigger: org.bukkit.event.entity.PlayerDeathEvent
    Channel: chronicle
    Conditions:
      - '#event.entity.killer != null'
    Embed:
      Enabled: true
      Color: "#5a0000"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/iron_sword.png"
      Author:
        Name: "${#event.entity.name} ${(#event.hashCode() % 5 + 5) % 5 == 0 ? 'пал от руки' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'был повержен' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'встретил свой конец от руки' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'не пережил встречи с' : 'сложил голову под клинком'} ${#event.entity.killer.name}"

  # ── Редкие смерти ────────────────────────────────────────────────
  - Trigger: org.bukkit.event.entity.PlayerDeathEvent
    Channel: chronicle
    Conditions:
      - '#event.entity.killer == null'
      - '#event.entity.lastDamageCause != null'
      - '#event.entity.lastDamageCause.cause.name() matches "(LIGHTNING|MAGIC|POISON|CAMPFIRE|VOID|FLY_INTO_WALL|FREEZE|SONIC_BOOM|WITHER|WORLD_BORDER|THORNS|CRAMMING|FALLING_BLOCK|STARVATION|SUFFOCATION)"'
    Embed:
      Enabled: true
      Color: "#5a0000"
      Author:
        Name: "${#event.entity.name} ${
          #event.entity.lastDamageCause.cause.name() == 'LIGHTNING' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'был избран небесами в качестве громоотвода' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'попал под удар молнии' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'узнал на себе силу молнии' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'поджарился от молнии' : 'получил с неба разряд молнии, хотя не просил') :
          #event.entity.lastDamageCause.cause.name() == 'MAGIC' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'перепутал зелья и отравился' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'стал жертвой собственной алхимии' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'провёл свой последний алхимический опыт на себе' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'убедился что не все зелья лечат' : 'пал от магии собственного же изготовления') :
          #event.entity.lastDamageCause.cause.name() == 'POISON' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'тихо и не спеша угас от яда' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'не нашел вовремя противоядие' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'обнаружил что яд действительно убивает' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'стал жертвой зелёной смерти' : 'успел попрощаться - яд не торопился') :
          #event.entity.lastDamageCause.cause.name() == 'CAMPFIRE' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'присел у костра в последний раз' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'слишком близко познакомился с огнём' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'решил что костёр не такой уж горячий' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'обогрелся - навсегда' : 'неудачно наступил на костёр') :
          #event.entity.lastDamageCause.cause.name() == 'VOID' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'неудачно шагнул за край мира' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'отправился исследовать бездну' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'решил проверить есть ли дно у пустоты' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'улетел туда откуда не возвращаются' : 'обнаружил что за краем мира ничего нет') :
          #event.entity.lastDamageCause.cause.name() == 'FLY_INTO_WALL' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'слишком уверенно летел на элитрах - не долетел' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'переоценил манёвренность элитр' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'познал физику на собственном опыте' : (#event.hashCode() % 5 + 5) % 5 == 3 ? '- последний полёт оказался слишком низким' : 'приземлился раньше чем планировал') :
          #event.entity.lastDamageCause.cause.name() == 'FREEZE' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'стал частью зимнего пейзажа навсегда' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'шагнул в рыхлый снег и остался там навсегда' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'остался зимовать - навсегда' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'превратился в ледяную скульптуру' : '- рыхлый снег принял его в свои объятия') :
          #event.entity.lastDamageCause.cause.name() == 'SONIC_BOOM' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'посмертно оценил звуковую волну Хранителя' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'был сдут с лица земли Хранителем' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'услышал Хранителя в последний раз' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'не увернулся от Хранителя' : 'не успел убежать от звукового удара Хранителя') :
          #event.entity.lastDamageCause.cause.name() == 'WITHER' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'иссох заживо' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'медленно растворился во тьме иссушения' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'узнал про эффект иссушения на себе' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'был иссушен до последней капли' : 'угас от иссушения') :
          #event.entity.lastDamageCause.cause.name() == 'WORLD_BORDER' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'решил проверить где заканчивается мир' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'нашёл границу мира - и она нашла его' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'дошёл до границы мира и не вернулся' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'отправился за границу мира без возврата' : '- граница мира не пропустила его обратно') :
          #event.entity.lastDamageCause.cause.name() == 'THORNS' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'не рассчитал силы и ударился об чужие шипы' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'ударил по броне с зачарованием Шипы - и пожалел' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'обнаружил что броня противника кусается' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'пал жертвой собственной агрессии' : 'нарвался - в самом прямом смысле') :
          #event.entity.lastDamageCause.cause.name() == 'CRAMMING' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'был раздавлен толпой' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'оказался не в том месте среди не тех существ' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'упал под толпу' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'был поглощён толпой без остатка' : 'узнал что в толпе не всегда безопасно') :
          #event.entity.lastDamageCause.cause.name() == 'FALLING_BLOCK' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'был отправлен к праотцам упавшим блоком' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'не посмотрел наверх в нужный момент' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'наковальня нашла его сама' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'стал жертвой гравитации чужого блока' : 'последнее что увидел - тень сверху') :
          #event.entity.lastDamageCause.cause.name() == 'STARVATION' ? ((#event.hashCode() % 5 + 5) % 5 == 0 ? 'изголодался со скуки' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'пренебрегал едой до самого конца' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'принял голод за незначительный дискомфорт' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'экономил еду до последнего' : 'умер богатым на опыт, но не на еду') :
          (#event.hashCode() % 5 + 5) % 5 == 0 ? 'был замурован заживо' : (#event.hashCode() % 5 + 5) % 5 == 1 ? 'застрял там откуда не выбраться' : (#event.hashCode() % 5 + 5) % 5 == 2 ? 'обнаружил что дышать сквозь блоки невозможно' : (#event.hashCode() % 5 + 5) % 5 == 3 ? 'оказался внутри блока без шансов на спасение' : '- блоки сомкнулись вокруг него и не разомкнулись'}"
      Timestamp: true

  # ── Рыбалка: Обычный улов ~64.725% ──────────────────────────────
  # h % 4000 в [0, 2589) → 2589 значений = 64.725%
  - Trigger: org.bukkit.event.player.PlayerFishEvent
    Channel: fish
    Conditions:
      - state.name() == 'CAUGHT_FISH'
      - caught.itemStack.type.name() matches '(COD|SALMON|PUFFERFISH|TROPICAL_FISH)'
      - (#event.hashCode() % 4000 + 4000) % 4000 < 2589
    Embed:
      Enabled: true
      Color: "#2f3136"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/${caught.itemStack.type.name().toLowerCase()}.png"
      Author:
        Name: "{name} поймал рыбу"
      Description: "**${caught.itemStack.type.name() == 'COD' ? 'Треска' : caught.itemStack.type.name() == 'SALMON' ? 'Лосось' : caught.itemStack.type.name() == 'PUFFERFISH' ? 'Иглобрюх' : 'Тропическая рыба'}** • **Вес:** ${(#event.hashCode() % 17 + 3) / 10.0} кг"
      Footer:
        Text: "Обычный улов"

  # ── Рыбалка: Хороший улов ~25% ───────────────────────────────────
  # h % 4000 в [2589, 3589) → 1000 значений = 25.00%
  - Trigger: org.bukkit.event.player.PlayerFishEvent
    Channel: fish
    Conditions:
      - state.name() == 'CAUGHT_FISH'
      - caught.itemStack.type.name() matches '(COD|SALMON|PUFFERFISH|TROPICAL_FISH)'
      - (#event.hashCode() % 4000 + 4000) % 4000 >= 2589
      - (#event.hashCode() % 4000 + 4000) % 4000 < 3589
    Embed:
      Enabled: true
      Color: "#b2b2b2"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/${caught.itemStack.type.name().toLowerCase()}.png"
      Author:
        Name: "{name} поймал рыбу"
      Description: "**${caught.itemStack.type.name() == 'COD' ? 'Треска' : caught.itemStack.type.name() == 'SALMON' ? 'Лосось' : caught.itemStack.type.name() == 'PUFFERFISH' ? 'Иглобрюх' : 'Тропическая рыба'}** • **Вес:** ${(#event.hashCode() % 25 + 15) / 10.0} кг"
      Footer:
        Text: "Хороший улов"

  # ── Рыбалка: Редкий улов ~10% ────────────────────────────────────
  # h % 4000 в [3589, 3989) → 400 значений = 10.00%
  - Trigger: org.bukkit.event.player.PlayerFishEvent
    Channel: fish
    Conditions:
      - state.name() == 'CAUGHT_FISH'
      - caught.itemStack.type.name() matches '(COD|SALMON|PUFFERFISH|TROPICAL_FISH)'
      - (#event.hashCode() % 4000 + 4000) % 4000 >= 3589
      - (#event.hashCode() % 4000 + 4000) % 4000 < 3989
    Embed:
      Enabled: true
      Color: "#4b69ff"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/${caught.itemStack.type.name().toLowerCase()}.png"
      Author:
        Name: "{name} поймал рыбу"
      Description: "**${caught.itemStack.type.name() == 'COD' ? 'Треска' : caught.itemStack.type.name() == 'SALMON' ? 'Лосось' : caught.itemStack.type.name() == 'PUFFERFISH' ? 'Иглобрюх' : 'Тропическая рыба'}** • **Вес:** ${(#event.hashCode() % 35 + 35) / 10.0} кг"
      Footer:
        Text: "Редкий улов"

  # ── Рыбалка: Легендарный улов ~0.25% ─────────────────────────────
  # h % 4000 в [3989, 3999) → 10 значений = 0.25%
  - Trigger: org.bukkit.event.player.PlayerFishEvent
    Channel: fish
    Conditions:
      - state.name() == 'CAUGHT_FISH'
      - caught.itemStack.type.name() matches '(COD|SALMON|PUFFERFISH|TROPICAL_FISH)'
      #- (#event.hashCode() % 1000 + 1000) % 1000 >= 10     # 99% шанс
      - (#event.hashCode() % 4000 + 4000) % 4000 >= 3989
      - (#event.hashCode() % 4000 + 4000) % 4000 < 3999
    Embed:
      Enabled: true
      Color: "#FFD700"
      Author:
        ImageUrl: "{embedavatarurl}"
        Name: "{name} поймал легендарную рыбу"
      ThumbnailUrl: "https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21.11/assets/minecraft/textures/item/${caught.itemStack.type.name().toLowerCase()}.png"
      Title:
        Text: "${caught.itemStack.type.name() == 'COD' ? 'Трофейная треска' : caught.itemStack.type.name() == 'SALMON' ? 'Трофейный лосось' : caught.itemStack.type.name() == 'PUFFERFISH' ? 'Трофейный иглобрюх' : 'Трофейная тропическая рыба'}"
      Description: "**Вес:** ${(#event.hashCode() % 60 + 60) / 10.0} кг\n**Биом:** ${T(com.google.gson.JsonParser).parseString(T(java.nio.file.Files).readString(T(java.nio.file.Paths).get('plugins/DiscordSRV/assets/ru_ru.json'))).getAsJsonObject().get('biome.minecraft.' + #player.location.block.biome.name().toLowerCase()).getAsString()}\n**Погода:** ${#player.world.hasStorm() ? 'Гроза' : #player.world.isThundering() ? 'Дождь' : 'Ясно'}\n**Время:** ${#player.world.time < 6000 ? 'Утро' : #player.world.time < 12000 ? 'День' : #player.world.time < 18000 ? 'Вечер' : 'Ночь'}"
      Footer:
        Text: "⭐ Легендарный улов!"
      Timestamp: true

