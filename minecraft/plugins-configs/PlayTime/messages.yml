# ============================================================
#                       PlayTime Messages
# ============================================================
# Все сообщения, используемые плагином PlayTime.
# ============================================================

# Глобальный префикс, используемый в большинстве сообщений.
prefix: "&bᴘʟᴀʏᴛɪᴍᴇ &e♦ &f"

messages:

  # ----------------------------------------------------------
  # СООБЩЕНИЯ О ВРЕМЕНИ ИГРЫ
  # ----------------------------------------------------------
  playtime:
    # Сообщение, показываемое при проверке СВОЕГО времени игры:
    #   /playtime
    # Плейсхолдеры:
    #   %prefix%          - Глобальный префикс
    #   %playtime%        - Общее отформатированное время игры
    #   %afk-time%        - Отформатированное общее время AFK
    #   %active-playtime% - Отформатированное активное (не AFK) время
    #   %joins%           - Количество входов (статистика LEAVE_GAME)
    #   %date-joined%     - Дата первого входа (yyyy-MM-dd)
    self:
      - "%prefix%&fВы играли &b%playtime%&f."
      - "%prefix%&fАктивное время: &a%active-playtime% &7(без AFK)"
      - "%prefix%&fВремя в AFK: &c%afk-time%"
      - "%prefix%&fКоличество входов: &b%joins%"
      - "%prefix%&fПервый вход: &b%date-joined%"

    # Сообщение, показываемое при проверке времени ДРУГОГО игрока:
    #   /playtime <player>
    # Плейсхолдеры:
    #   %prefix%
    #   %player%      - Имя целевого игрока
    #   %playtime%
    #   %joins%
    #   %date-joined%
    other:
      - "%prefix%&b%player% &fиграл &b%playtime%&f."
      - "%prefix%&b%player% &fзаходил &b%joins% &fраз."
      - "%prefix%&b%player% &fвпервые зашёл &b%date-joined%&f."

    # Сообщение, когда нет сохранённых данных о времени игры для игрока:
    #   (например, /playtime <player>, если данных нет)
    # Плейсхолдеры:
    #   %prefix%
    #   %target% - Имя, указанное в команде или распознанное имя игрока
    not-found:
      - "%prefix%&cНе &fнайдено данных о времени игры для &b%target%&f."

  # Сообщения, связанные с подкомандой resetplaytime.
  resetplaytime-usage: "&fИспользование&7: &e/playtime resetplaytime (игрок)"
  resetplaytime-success: "&cСброшено &fвремя игры для &b%player%&f."
  resetplaytime-target: "&fВаше время игры было &cсброшено &fадминистратором&4."

  # ----------------------------------------------------------
  # ОБЩИЕ / СИСТЕМНЫЕ СООБЩЕНИЯ
  # ----------------------------------------------------------

  # Отправляется после /playtime reload
  reloaded: "%prefix%&aКонфигурация перезагружена."

  # Опционально: сообщение при открытии GUI топа (если используется).
  top-header: "%prefix%Открытие топа времени игры..."

  # Сообщение об отсутствии прав для ограниченных команд.
  no-permission: "%prefix%&cУ вас нет прав на выполнение этой команды."

  # Отправляется, когда команда должна выполняться игроком, но отправитель — консоль.
  player-only: "%prefix%&cЭта команда доступна только игрокам."

  # Отправляется, когда имя игрока не найдено или недействительно.
  invalid-player: "%prefix%&cИгрок не найден."

  # Общее сообщение о неверном использовании (резервное).
  invalid-usage: "%prefix%&cНеверное использование команды."

  # ----------------------------------------------------------
  # СООБЩЕНИЯ ОБ ОЧИСТКЕ / УПРАВЛЕНИИ НАГРАДАМИ
  # ----------------------------------------------------------

  # Отправляется ЦЕЛЕВОМУ игроку (если включено в config.yml) при очистке его наград.
  rewards-were-cleared: "%prefix%Ваши данные о наградах за время игры были &cсброшены&f."

  # Отправляется администратору после успешной очистки наград.
  cleared-players-rewards: "%prefix%Все данные о наградах для &b%player% &fбыли &ccброшены&f."

  # Отправляется, если администратор пытается подтвердить очистку для игрока,
  # данные которого не ожидают подтверждения.
  player-not-on-the-confirm-list: "%prefix%Награды этого игрока не ожидают очистки. &7(&e/pt clearrewards %player%&7)"

  # Отправляется при попытке очистить «постоянные» награды, которые намеренно нельзя сбросить.
  constant-rewards-cant-be-cleared: "%prefix%&bПостоянные &fнаграды нельзя сбросить. Они предназначены для повторного получения."

  # Отправляется при очистке ежедневных наград.
  daily-rewards-were-cleared: "%prefix%&eЕжедневные &fнаграды были &ccброшены &fдля &b%player%&f."

  # Отправляется при очистке наград за серию.
  streaks-were-cleared: "%prefix%&cНаграды за серию &fбыли &ccброшены &fдля &b%player%&f."

  # Отправляется при очистке сессионных наград.
  session-rewards-were-cleared: "%prefix%&6Сессионные &fнаграды были &ccброшены &fдля &b%player%&f."

  # Отправляется при очистке уникальных наград.
  unique-rewards-were-cleared: "%prefix%&aУникальные &fнаграды были &ccброшены &fдля &b%player%&f."

  # Отправляется при указании неверного типа наград.
  invalid-reward-type: "%prefix%&cНеверный &fтип наград. Доступно: &aunique&f, &edaily&f, &6session&f, &bconstant&f, &cstreaks"

  # Отправляется, если администратор пытается добавить одного и того же игрока в список подтверждения дважды.
  players-data-already-in-confirm-list: "%prefix%Данные наград для &b%player% &fуже ожидают подтверждения. &7(&e/pt clearrewards %player% confirm&7)"

  # Отправляется, когда система наград глобально отключена в config.yml.
  rewards-disabled: "%prefix%Награды &cотключены&f."

  # ----------------------------------------------------------
  # УВЕДОМЛЕНИЕ ОБ ОФФЛАЙНЕ
  # ----------------------------------------------------------
  # Отправляется (если настроено) при проверке времени игры оффлайн-игрока.
  player-offline: "%prefix%&b%player% &fв данный момент &cоффлайн&f."

  # ----------------------------------------------------------
  # СООБЩЕНИЯ С HOVER / КЛИКАБЕЛЬНЫМ ПОДТВЕРЖДЕНИЕМ
  # ----------------------------------------------------------
  hover-message:
    # Основная строка в чате с кликабельным компонентом.
    message-in-chat: "%prefix%Требуется подтверждение очистки &lВСЕХ &fданных о наградах игрока &b%player%&f. &7(&a&lНажмите для подтверждения&7)"

    # Текст при наведении на кликабельную строку.
    hover: "&fНажмите, чтобы подтвердить очистку данных о наградах игрока &b%player%&f."

  # ----------------------------------------------------------
  # ПОМОЩЬ ПО ОЧИСТКЕ НАГРАД
  # ----------------------------------------------------------
  clear-rewards-breakdown:
    - "%prefix%Использование: &e/pt clearrewards (игрок) [тип-наград]"
    - "                     &7(обязательно) [необязательно]"
    - "&f"
    - "&fДоступные типы наград: &aunique&f, &edaily&f, &6session&f, &bconstant&f, &cstreaks"

  # ----------------------------------------------------------
  # СПИСОК КОМАНД ПОМОЩИ
  # ----------------------------------------------------------
  help:
  - "%prefix%&e/playtime &7- &fПосмотреть своё время игры."
  - "%prefix%&e/playtime (игрок) &7- &fПосмотреть время игры другого игрока."
  - "%prefix%&e/playtime rewards &7- &fПосмотреть награды за достижения по времени игры."
  - "%prefix%&e/playtime streaks &7- &fПосмотреть прогресс ежедневной серии."
  - "%prefix%&e/playtime clearrewards (игрок) [тип-наград] &7- &fОчистить все или указанный тип данных о наградах игрока."
  - "%prefix%&e/playtime resetplaytime (игрок) &7- &fСбросить общее время игры игрока."
  - "%prefix%&e/playtime top &7- &fПосмотреть топ по времени игры (общий)."
  - "%prefix%&e/playtime topday (yyyy-MM-dd) [количество] &7- &fПосмотреть топ по времени игры за конкретный день."
  - "%prefix%&e/playtime topmonth (yyyy-MM) [количество] &7- &fПосмотреть топ по времени игры за конкретный месяц."
  - "%prefix%&e/playtime reload &7- &fПерезагрузить конфигурацию плагина."
