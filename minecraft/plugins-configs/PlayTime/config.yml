# ============================================================
#                       PlayTime - config.yml
# ============================================================
# Этот файл управляет форматированием времени игры, работой наград,
# синхронизацией с MySQL, проверкой обновлений и всеми макетами GUI.
# ============================================================

settings:
  # ----------------------------------------------------------
  #                        ФОРМАТ ВРЕМЕНИ ИГРЫ
  # ----------------------------------------------------------
  # Управляет отображением всех плейсхолдеров времени игры с форматированием
  # (например: %playtime_playtime%, %playtime_session% и т.д.).
  #
  # ✅ Два популярных стиля:
  #
  #   (A) Компактный:   "2д 8ч 16м"
  #   (B) Полный:       "2 дня 8 часов 16 минут"
  #
  # Можно мгновенно переключаться между ними с помощью пресетов ниже.
  # Просто РАскомментируйте один блок пресета (уберите #) и перезапустите/перезагрузите.
  #
  # Примечания:
  # - Time-Format-Units управляет тем, какие единицы показываются и в каком порядке.
  # - Time-Format-Hide-Zeros скрывает единицы со значением 0 (рекомендуется).
  # - Time-Formats — это метки единиц, добавляемые после числа.
  #   Пример: День: "д" -> "2д" | День: " день" -> "2 день"
  # - Append-Formats-With-An-S управляет множественным числом "s" для полных меток.
  # - Time-Format-Separator — это разделитель МЕЖДУ единицами, НЕ между
  #   числом и меткой единицы.
  #   Пример: разделитель " " -> "2д 8ч" | разделитель "" -> "2д8ч"

  # ----------------------------------------------------------
  #                   БЫСТРЫЕ ПРЕСЕТЫ (выберите ОДИН)
  # ----------------------------------------------------------

  # --- Пресет A: Компактный (рекомендуемый/по умолчанию) -> "2д 8ч 16м"
  #Time-Format-Units:
  #  - day
  #  - hour
  #  - minute
  #  # - second
  #Time-Formats:
  #  Day: "д"
  #  Hour: "ч"
  #  Minute: "м"
  #  Second: "с"
  #Time-Format-Separator: " "     # пробел между единицами: "2д 8ч 16м"
  #Time-Format-Hide-Zeros: true
  #Append-Formats-With-An-S: false # не нужно для д/ч/м/с

  # --- Пресет B: Компактный (без пробелов) -> "2д8ч16м"
  #Time-Format-Units:
  #  - day
  #  - hour
  #  - minute
  #Time-Formats:
  #  Day: "д"
  #  Hour: "ч"
  #  Minute: "м"
  #  Second: "с"
  #Time-Format-Separator: ""      # без разделителя между единицами
  #Time-Format-Hide-Zeros: true
  #Append-Formats-With-An-S: false

  # --- Пресет C: Полный формат -> "2 дня 8 часов 16 минут"
  #Time-Format-Units:
  #  - day
  #  - hour
  #  - minute
  #  # - second
  #Time-Formats:
  #  Day: " день"
  #  Hour: " час"
  #  Minute: " минута"
  #  Second: " секунда"
  #Time-Format-Separator: " "     # пробел между единицами
  #Time-Format-Hide-Zeros: true
  #Append-Formats-With-An-S: true  # автоматически добавляет множественное число
  
  # Формат даты для %date-joined%
  # Примеры:
  #   "yyyy-MM-dd" -> 2025-12-18
  #   "dd-MM-yyyy" -> 18-12-2025
  Join-Date-Format: "dd-MM-yyyy"

  # ----------------------------------------------------------
  #               АКТИВНЫЕ НАСТРОЙКИ (по умолчанию)
  # ----------------------------------------------------------
  # Выберите здесь единицы и их порядок.
  Time-Format-Units:
    - day
    - hour
    - minute
    - second

  # Метки единиц (что идёт после числа).
  # Совет: Используйте "д/ч/м/с" для компактного вида или " день/час/минута/секунда" для полного.
  Time-Formats:
    Day: "д"
    Hour: "ч"
    Minute: "м"
    Second: "с"

  # Разделитель МЕЖДУ единицами (не между числом и меткой единицы).
  #
  # Примеры:
  #   - Компактные метки (д/ч/м/с):
  #       Разделитель: " "  -> "2д 8ч 16м"
  #       Разделитель: ""   -> "2д8ч16м"
  #
  #   - Полные метки (" день", " час", ...):
  #       Разделитель: " "  -> "2 дня 8 часов 16 минут"
  #       Разделитель: ""   -> "2 дня8 часов16 минут"  (обычно НЕ желательно)
  #
  # ВАЖНО:
  # - Пробел между ЧИСЛОМ и МЕТКОЙ берётся из Time-Formats.
  # - Пробел между КАЖДОЙ ПАРЫ единиц берётся из Time-Format-Separator.
  Time-Format-Separator: " "

  # Если включено, скрывать единицы со значением 0 (рекомендуется).
  # Пример: если секунды включены, но равны 0, не будет показываться "0 секунд".
  Time-Format-Hide-Zeros: true

  # Автоматически добавлять "s" для множественного числа (только для полных меток).
  # true  -> "2 days"
  # false -> "2 day"
  Append-Formats-With-An-S: false

  AFK:
    Enabled: true
    Threshold-Seconds: 300  # 5 минут бездействия до статуса AFK

  # ----------------------------------------------------------
  #                 НАГРАДЫ & УВЕДОМЛЕНИЯ ОБ ОЧИСТКЕ
  # ----------------------------------------------------------
  Rewards-Cleared:
    # Когда администратор очищает награды игрока:
    # Если true, затронутый игрок получит сообщение в чат.
    # Если false, подтверждение увидит только администратор.
    Tell-Target-All-Their-PlayTime-Rewards-Were-Cleared: true

  Rewards:
    # Главный переключатель для всех наград PlayTime.
    # true  -> Система наград включена.
    # false -> Награды не выдаются и не доступны.
    Enabled: false

    Auto-Claim:
      # Если true, доступные награды выдаются автоматически.
      # Если false, игроки должны вручную забирать награды через GUI.
      Enabled: true
    Types: # Включить или выключить конкретные типы наград.
      Constant: true
      Unique: true
      Daily: true
      Session: true
      Streaks: true

  # ----------------------------------------------------------
  # ИСТОЧНИК ВРЕМЕНИ ИГРЫ
  # ----------------------------------------------------------
  # Если true:
  #   Использовать существующие данные времени игры из мира/playerdata
  #   там, где это возможно, как базу.
  # Если false:
  #   Использовать собственный подсчёт PlayTime с момента установки плагина.
  Use-existing-playtime: true

# ============================================================
#                      НАСТРОЙКИ ПРОВЕРКИ ОБНОВЛЕНИЙ
# ============================================================
update-check:
  # Включить или выключить автоматическую проверку обновлений.
  enabled: false

  # Нод разрешения для получения уведомлений об обновлениях.
  permission: playtime.update

  # Сообщение при наличии новой версии.
  # Плейсхолдеры:
  #   %latest%  - Последняя доступная версия
  #   %current% - Ваша текущая версия
  message: "&bᴘʟᴀʏᴛɪᴍᴇ &e♦ &fДоступна новая версия &b%latest%&f. У вас &e%current%&f."

  # Текст для кликабельной кнопки загрузки.
  button-text: "&7[&a&lНажмите для загрузки&7]"

# ============================================================
#                      НАСТРОЙКИ ПЛЕЙСХОЛДЕРОВ
# ============================================================
placeholders:
  # Текст по умолчанию, когда плейсхолдер "позиция в топе" или подобный
  # не имеет данных (например, top_10 на сервере с 3 игроками).
  no-data: '---'

# ============================================================
#                          НАСТРОЙКА MySQL
# ============================================================
# Используется для хранения и синхронизации данных времени игры между серверами.
# Если у вас один сервер и не нужна внешняя база или кросс-синхронизация, оставьте выключенным.
# ============================================================
mysql:
  # Главный переключатель MySQL.
  enabled: false

  # Основные учётные данные подключения.
  host: localhost
  port: 3306
  database: playtime
  username: root
  password: password
  table: playtime_data

  # SSL и безопасность.
  use-ssl: false                   # Включите, только если сервер MySQL требует SSL.
  allow-public-key-retrieval: true # Некоторые хостинги требуют этого для аутентификации.

  # Поведение подключения / надёжность.
  auto-reconnect: true             # Автоматическое переподключение при потере связи.
  connect-timeout-ms: 8000         # Время ожидания при открытии нового подключения.
  socket-timeout-ms: 0             # 0 = без ограничения (будьте осторожны на нестабильных сетях).

  # Keepalive / обнаружение мёртвых подключений.
  tcp-keepalive: true
  keepalive-minutes: 5

  # Стратегия переподключения.
  reconnect-attempts: 3
  reconnect-interval-ms: 2000

  # Синхронизация данных между несколькими серверами:
  # Если true:
  #   Все подключённые серверы, использующие эту базу, делят единое
  #   актуальное значение времени игры для каждого игрока.
  sync-between-servers: true
  
  # Для точного обновления времени игры по всей
  # сети запускается фоновая задача, которая периодически
  # пингует таблицу MySQL для обновления всех времён игры.
  network-refresh-seconds: 60
  
  # -----------------------------------------------------------------
  # НАСТРОЙКИ МНОГОСЕРВЕРНОЙ СЕТИ / БЭКЕНДА
  # -----------------------------------------------------------------

  # Уникальный идентификатор ЭТОГО серверного бэкенда в вашей сети.
  # Примеры значений:
  #   "survival", "prison", "skyblock", "hub"
  #
  # Используется для подсчёта времени игры по серверам.
  server-id: "default"

  # Если true:
  #   - Этот бэкенд НЕ будет читать/писать в глобальную таблицу MySQL времени игры.
  #   - Глобальное время сети полностью игнорирует этот сервер.
  #   - Этот сервер всё ещё отслеживает время локально в data.yml
  #     (и может использовать подсчёт по серверам, если включено ниже).
  blacklist-this-server-from-global: false

  # Подсчёт времени игры по серверам:
  # Если включено:
  #   - Время игры для этого бэкенда (идентифицируется server-id)
  #     хранится в отдельной таблице MySQL.
  #   - По умолчанию НЕ влияет на логику наград/топов; это дополнительные данные,
  #     которые можно вывести через плейсхолдеры, команды и т.д.
  per-server:
    enabled: false
    table: playtime_per_server

# ============================================================
#                           НАСТРОЙКИ GUI
# ============================================================
# Настройка внешнего вида и поведения GUI PlayTime:
# - Топ времени игры
# - Меню наград и меню типов
# ============================================================
guis:

  # ----------------------------------------------------------
  # GUI ТОПА ВРЕМЕНИ ИГРЫ
  # ----------------------------------------------------------
  Top:
    
    # Заголовок GUI топа времени игры.
    Title: '&fᴛᴏᴘ &bᴘʟᴀʏᴛɪᴍᴇꜱ'

    # Заголовок GUI топа времени игры с диапазоном дат.
    Title-Range: '&fᴛᴏᴘ &bᴘʟᴀʏᴛɪᴍᴇꜱ &7(%from% - %to%)'

    # Количество игроков для показа.
    How-Many-Players-To-Display-In-The-GUI: 10

    # Формат строки игрока (левый дисплей) в GUI.
    # Плейсхолдеры:
    #   %position% - Позиция в рейтинге (1, 2, 3, ...)
    #   %player%   - Имя игрока
    Players-Name: '&b#%position% &7» &b%player%'

    # Формат времени игры под/рядом с записью игрока.
    # Плейсхолдер:
    #   %playtime% - Отформатированная строка времени игры
    Players-Playtime: '&7%playtime%'
    
    # Опциональная декоративная рамка вокруг GUI.
    Border:
    # ВАЖНО: Если Border.Enabled = true, НЕ устанавливайте размер ниже 27, иначе головы в лидерборде не поместятся.
      Enabled: true
      Item:
        material: BLACK_STAINED_GLASS_PANE
        name: '&r'
        lore: []

    # Каждая запись:
    #   slot: слот инвентаря (0-26 для размера 27)
    #   action: open-type | run-command | open-url | none
    #   type: constant | unique | session | daily | streaks (для open-type)
    #   material / itemsadder-id / texturepackmanager-id / skull / и т.д.
    #   name: отображаемое имя
    #   lore: список строк описания
    Items:
      close:
        slot: 26
        action: close
        material: BARRIER
        name: '&cЗакрыть'
        lore:
          - '&7Нажмите, чтобы закрыть меню'

    # ------------------------------------------------------
    # ДОПОЛНИТЕЛЬНЫЕ / КАСТОМНЫЕ КНОПКИ & ДЕКОРАЦИИ
    # ------------------------------------------------------
    # Используйте для добавления:
    # - Ссылок (Discord, Магазин, Сайт)
    # - Декоративных предметов
    # - Кнопок команд и т.д.
    #
    # Каждая запись поддерживает:
    #   slot: слот инвентаря
    #   action:
    #     - open-type      → открыть категорию наград (constant/unique/session/daily/streaks)
    #     - run-command    → выполнить команду ОТ КОНСОЛИ
    #     - player-command → выполнить команду ОТ ИГРОКА
    #     - open-url       → отправить кликабельную ссылку в чат
    #     - none           → чисто декоративная
    #
    #   command/url: команда или URL для использования
    #   material: имя материала Bukkit (или itemsadder-id / texturepackmanager-id / skull)
    #   name: отображаемое имя
    #   lore: список строк описания
    #   опционально:
    #     custom-model-data: integer
    #     glow: true/false
    #     flags: [HIDE_ENCHANTS, HIDE_ATTRIBUTES, ...]
    #     skull.owner: имя игрока или UUID
    #     skull.texture-base64: кастомная текстура головы
    #     itemsadder-id: "packname:item_id"
    #     texturepackmanager-id: "your_item_id"
    #
    # ВАЖНО (команды):
    #   - Для run-command (консоль):
    #       Команда выполняется ОТ КОНСОЛИ.
    #       Пример: "say %player% кликнул по голове!"
    #       (Не используйте "/")
    #
    #   - Для player-command (игрок):
    #       Команда выполняется ОТ ИГРОКА, который кликнул.
    #       ОБЯЗАТЕЛЬНО используйте ведущий "/" как обычную команду чата.
    #       Пример:
    #         action: player-command
    #         command: "/spawn"
    #
    Extras:
      - slot: 0
        action: open-url
        url: "https://yourstore.example"
        url-label: "&bМагазин"
        material: EMERALD
        name: "&bМагазин"
        lore:
          - "&7Нажмите, чтобы открыть магазин"

  # ----------------------------------------------------------
  # ОСНОВНОЕ МЕНЮ НАГРАД GUI
  # ----------------------------------------------------------
  Rewards:
    Main:
      # Заголовок и размер основного GUI наград.
      Title: '&bᴘʟᴀʏᴛɪᴍᴇ &fʀᴇᴡᴀʀᴅꜱ'
      Size: 27  # Должен быть допустимым размером инвентаря (кратным 9)

      # Опциональная декоративная рамка вокруг GUI.
      Border:
        Enabled: true
        Item:
          material: BLACK_STAINED_GLASS_PANE
          name: '&r'
          lore: []

      # ------------------------------------------------------
      # ОСНОВНЫЕ КНОПКИ КАТЕГОРИЙ НАГРАД
      # ------------------------------------------------------
      # Каждая запись:
      #   slot: слот инвентаря (0-26 для размера 27)
      #   action: open-type | run-command | open-url | none
      #   type: constant | unique | session | daily | streaks (для open-type)
      #   material / itemsadder-id / texturepackmanager-id / skull / и т.д.
      #   name: отображаемое имя
      #   lore: список строк описания
      Items:
        constant:
          slot: 10
          action: open-type
          type: constant
          material: DIAMOND
          name: '&bПостоянные'
          lore:
            - '&7Повторяемые награды'
            - '&7на основе общего времени игры'

        unique:
          slot: 12
          action: open-type
          type: unique
          material: EMERALD
          name: '&aУникальные'
          lore:
            - '&7Разовые достижения'

        session:
          slot: 14
          action: open-type
          type: session
          material: IRON_INGOT
          name: '&6Сессионные'
          lore:
            - '&7Будьте онлайн заданное время'

        daily:
          slot: 16
          action: open-type
          type: daily
          material: GOLD_INGOT
          name: '&eЕжедневные'
          lore:
            - '&7Один раз в день'

        streaks:
          slot: 22
          action: open-type
          type: streaks
          material: TRIPWIRE_HOOK
          name: '&cСерии'
          lore:
            - '&7Играйте X минут в день'
            - '&7Y дней подряд'

      # ------------------------------------------------------
      # ДОПОЛНИТЕЛЬНЫЕ / КАСТОМНЫЕ КНОПКИ & ДЕКОРАЦИИ
      # ------------------------------------------------------
      # Используйте для добавления:
      # - Ссылок (Discord, Магазин, Сайт)
      # - Декоративных предметов
      # - Кнопок команд и т.д.
      #
      # Каждая запись поддерживает:
      #   slot: слот инвентаря
      #   action:
      #     - open-type      → открыть категорию наград (constant/unique/session/daily/streaks)
      #     - run-command    → выполнить команду ОТ КОНСОЛИ
      #     - player-command → выполнить команду ОТ ИГРОКА
      #     - open-url       → отправить кликабельную ссылку в чат
      #     - none           → чисто декоративная
      #
      #   command/url: команда или URL для использования
      #   material: имя материала Bukkit (или itemsadder-id / texturepackmanager-id / skull)
      #   name: отображаемое имя
      #   lore: список строк описания
      #   опционально:
      #     custom-model-data: integer
      #     glow: true/false
      #     flags: [HIDE_ENCHANTS, HIDE_ATTRIBUTES, ...]
      #     skull.owner: имя игрока или UUID
      #     skull.texture-base64: кастомная текстура головы
      #     itemsadder-id: "packname:item_id"
      #     texturepackmanager-id: "your_item_id"
      #
      # ВАЖНО (команды):
      #   - Для run-command (консоль):
      #       Команда выполняется ОТ КОНСОЛИ.
      #       Пример: "say %player% кликнул по голове!"
      #       (Не используйте "/")
      #
      #   - Для player-command (игрок):
      #       Команда выполняется ОТ ИГРОКА, который кликнул.
      #       ОБЯЗАТЕЛЬНО используйте ведущий "/" как обычную команду чата.
      #       Пример:
      #         action: player-command
      #         command: "/spawn"
      #
      Extras:
        # Пример: Кнопка Discord
        - slot: 4
          action: open-url
          url: "https://discord.gg/yourserver"
          url-label: "&bПрисоединиться к Discord"
          material: BOOK
          name: "&bDiscord"
          lore:
            - "&7Нажмите, чтобы открыть ссылку"

        # Пример: кликабельная голова игрока (выполняет команду КОНСОЛИ)
        - slot: 0
          action: run-command
          command: "say %player% кликнул по голове!"
          material: PLAYER_HEAD
          skull:
            owner: "Notch"          # Или UUID
            # texture-base64: ""    # Или кастомная base64 текстура
          name: "&aЗнаменитая голова"
          lore:
            - "&7Выполняет команду консоли"
          glow: true

        # Пример (закомментирован) кнопки команды ОТ ИГРОКА:
        # - slot: 8
        #   action: player-command
        #   command: "/spawn"       # ВНИМАНИЕ: ведущий "/" чтобы выполнялась точно как игрок печатает
        #   material: ENDER_PEARL
