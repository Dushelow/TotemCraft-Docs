    # --------------------------------------------------------
    # МЕНЮ ПРОСМОТРА ТИПА НАГРАД (ПО КАТЕГОРИЯМ)
    # --------------------------------------------------------
    TypeMenu:
      Size: 54
      # Формат заголовка при просмотре конкретного типа наград.
      # Плейсхолдер:
      #   %type% - Текущий тип (Constant, Unique и т.д.)
      Title-Format: '&b%type% &fʀᴇᴡᴀʀᴅꜱ'
      
      Type-Names:
        constant: 'Постоянные'
        unique: 'Уникальные'
        session: 'Сессионные'
        daily: 'Ежедневные'
        streaks: 'Серии'

      # Кнопки навигации / управления в меню типа.
      Controls:
        Prev:
          slot: 45
          material: ARROW
          name: '&c« &fПредыдущая'

        Next:
          slot: 53
          material: ARROW
          name: '&fСледующая &a»'

        Back:
          slot: 49
          material: BARRIER
          name: '&cНазад'

        # Опционально: кнопка обновления для переоткрытия/перезагрузки страницы.
        Refresh:
          slot: 46
          material: SUNFLOWER
          name: '&bОбновить'
          lore:
            - '&7Нажмите, чтобы обновить страницу'

      # Статусные метки для наград в GUI.
      Status:
        # Игрок уже забрал эту награду.
        Claimed: '&a✔ &7Забрана'

        # Доступна и авто-забір активен.
        Eligible-Auto: '&b⏵ &7Автозабор включён'

        # Доступна, но требует ручного клика.
        Eligible-Click: '&e⏵ Нажмите для забора'

        # Недостаточно времени игры.
        Not-Eligible: '&7Пока недоступна'
